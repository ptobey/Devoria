# Devoria does not modify world rules unless this switch is explicitly enabled.
# Invalid types or out-of-range values stop startup with path-specific errors.
world-rules:
  enabled: false
  do-mob-spawning: false
  do-fire-tick: false
  random-tick-speed: 0
  mob-griefing: false

# The legacy database integration is disabled by default. Prefer environment
# variables for credentials: DEVORIA_DB_USERNAME and DEVORIA_DB_PASSWORD.
database:
  enabled: false
  url: "jdbc:mysql://localhost:3306/devoria?sslMode=VERIFY_IDENTITY"
  username: ""
  password: ""

# ModelEngine-backed mobs are optional. When unavailable or disabled, Devoria
# still starts and the summonmob command reports an actionable error.
integrations:
  model-engine:
    enabled: true

# A cast commits its effect, mana cost, and independent slot cooldown together.
# Cooldowns are milliseconds so existing timing behavior remains explicit.
spells:
  base:
    mana-cost: 10
    cooldown-millis: 1000
  utility:
    mana-cost: 20
    cooldown-millis: 4000
  heavy:
    mana-cost: 30
    cooldown-millis: 3000
  movement:
    mana-cost: 15
    cooldown-millis: 1000
